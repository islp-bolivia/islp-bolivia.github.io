# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
social:
  - title: twitter
    url: https://twitter.com/IslpBolivia
  - title: facebook
    url: https://www.facebook.com/islpBolivia/

# Postal address (add as many lines as necessary)
address:
  - line: La Paz - Bolivia

# Build settings - OPTIMIZADO PARA MEJOR RENDIMIENTO
markdown: kramdown
permalink: pretty

# Optimizaciones de compilación para mejor velocidad
incremental: true
future: false
limit_posts: 100

# Compilación CSS/SCSS optimizada
sass:
  style: compressed
  cache: true

# Plugins comunes (agrega solo los que realmente uses)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Configuración de caché para mejor rendimiento
keep_files:
  - img
  - css
  - js

# Excluir archivos innecesarios para optimizar build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - OPTIMIZACIONES.md
  - islp-bolivia.github.io.Rproj
